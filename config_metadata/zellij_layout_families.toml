schema_version = 1

[[layout_families]]
id = "sidebar"
layout_file = "yzx_side.kdl"
swap_layout_file = "yzx_side.swap.kdl"
sidebar_enabled = true
required_pane_names = ["sidebar"]
required_launcher_placeholders = ["__YAZELIX_SIDEBAR_COMMAND__", "__YAZELIX_SIDEBAR_ARGS__"]
swap_layouts = [
  "single_open",
  "single_closed",
  "vertical_split_open",
  "vertical_split_closed",
  "bottom_terminal_open",
  "bottom_terminal_closed",
]

[[auxiliary_layouts]]
id = "sidebar_closed_startup"
layout_file = "yzx_side_closed.kdl"
purpose = "managed-sidebar startup layout with the sidebar initially collapsed"

[[auxiliary_layouts]]
id = "sidebar_closed_startup_swap"
layout_file = "yzx_side_closed.swap.kdl"
purpose = "swap layouts for the managed-sidebar startup layout with the sidebar initially collapsed"

[[auxiliary_layouts]]
id = "sweep_test"
layout_file = "yzx_sweep_test.kdl"
purpose = "terminal sweep validation"
