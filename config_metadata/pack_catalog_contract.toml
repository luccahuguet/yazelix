# Canonical machine-readable metadata for the Yazelix pack surface.
# This artifact is intentionally separate from the main config contract because
# pack declarations and pack-sidecar semantics evolve differently from scalar
# config options.

[contract]
version = 1
surface = "packs"
declaration_count = 17
artifact_role = "canonical_pack_catalog"
default_template = "yazelix_packs_default.toml"
home_manager_module = "home_manager/module.nix"
loader_module = "nushell/scripts/utils/config_contract.nu"
scope_note = "Main config metadata lives in config_metadata/main_config_contract.toml."

[surface.enabled]
kind = "string_list"
default = []
toml_path = "enabled"
home_manager_option = "pack_names"
ownership = "pack_sidecar"
description_role = "enabled pack names"

[surface.user_packages]
kind = "string_list"
default = []
toml_path = "user_packages"
home_manager_option = "user_packages"
ownership = "pack_sidecar"
description_role = "additional package names or Home Manager package values"

[surface.declarations]
kind = "string_list_map"
default = {}
toml_path = "declarations"
home_manager_option = "pack_declarations"
ownership = "pack_sidecar"
description_role = "pack name to package list mapping"

[declarations.ai_agents]
packages = ["claude-code", "codex", "justcode", "gemini-cli", "pi", "opencode", "amp", "cursor-agent", "goose-cli", "tru"]
package_source = "llm_agents"

[declarations.ai_tools]
packages = ["coderabbit-cli", "ccusage", "ccusage-amp", "ccusage-codex", "ccusage-opencode", "beads", "beads-rust", "beads-viewer", "openclaw", "picoclaw", "zeroclaw"]
package_source = "mixed"

[declarations.config]
packages = ["mpls", "yaml-language-server"]
package_source = "nixpkgs"

[declarations.file-management]
packages = ["ouch", "erdtree", "serpl"]
package_source = "nixpkgs"

[declarations.git]
packages = ["onefetch", "gh", "prek"]
package_source = "nixpkgs"

[declarations.jj]
packages = ["jujutsu", "lazyjj", "jjui"]
package_source = "nixpkgs"

[declarations.maintainer]
packages = ["gh", "prek", "tru", "beads-rust", "beads-viewer", "nu-lint", "rust_wasi_toolchain"]
package_source = "mixed"

[declarations.python]
packages = ["ruff", "uv", "ty", "python3Packages.ipython"]
package_source = "nixpkgs"

[declarations.rust]
packages = ["rust_toolchain", "cargo-edit", "cargo-watch", "cargo-nextest", "cargo-audit"]
package_source = "nixpkgs"

[declarations.rust_maintainer]
packages = ["cargo-update", "cargo-binstall"]
package_source = "nixpkgs"

[declarations.rust_wasi]
packages = ["rust_wasi_toolchain"]
package_source = "nixpkgs"

[declarations.nix]
packages = ["nil", "nixd", "nixfmt"]
package_source = "nixpkgs"

[declarations.ts]
packages = ["nodePackages.typescript-language-server", "tailwindcss-language-server", "biome", "oxlint"]
package_source = "nixpkgs"

[declarations.modern_js]
packages = ["bun", "deno"]
package_source = "nixpkgs"

[declarations.go]
packages = ["gopls", "golangci-lint", "delve", "govulncheck"]
package_source = "nixpkgs"

[declarations.kotlin]
packages = ["kotlin-language-server", "ktlint", "detekt", "gradle"]
package_source = "nixpkgs"

[declarations.writing]
packages = ["typst", "tinymist", "pandoc", "markdown-oxide"]
package_source = "nixpkgs"
