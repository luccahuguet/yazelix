# Canonical machine-readable metadata for the sparse Yazelix Nova root config.
# Native tool configs and cursor settings remain separate sidecars.

[contract]
version = 2
ratconfig_contract_id = "yazelix.config"
ratconfig_contract_version = 2
ratconfig_applied_change_ids = ["classic-root-to-nova-v1"]
surface = "main"
field_count = 15
artifact_role = "canonical_machine_metadata"
default_template = "config_default.toml"
home_manager_module = "home_manager/module.nix"
loader_module = "rust_core/yazelix_core/src/config_normalize.rs"
scope_note = "Dynamic popups live under popups.<id>; native tool and cursor settings are excluded."

[rebuild]
extra_paths = []

[fields."open.log_level"]
kind = "string"
default = "info"
parser_key = "open_log_level"
home_manager_option = "open_log_level"
parser_behavior = "direct"
validation = "enum"
allowed_values = ["off", "error", "info", "debug"]
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."shell.program"]
kind = "string"
default = "nu"
parser_key = "default_shell"
home_manager_option = "shell_program"
parser_behavior = "direct"
validation = "enum"
allowed_values = ["nu", "bash", "zsh", "fish"]
rebuild_required = false
apply_mode = "shell_terminal_restart"

[fields."editor.command"]
kind = "string"
default = "hx"
parser_key = "editor_command"
home_manager_option = "editor_command"
parser_behavior = "direct"
rebuild_required = true
apply_mode = "tab_session_restart"

[fields."agent.command"]
kind = "string"
default = "auto"
parser_key = "agent_command"
home_manager_option = "agent_command"
parser_behavior = "direct"
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."agent.args"]
kind = "string_list"
default = []
parser_key = "agent_args"
home_manager_option = "agent_args"
parser_behavior = "direct"
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."welcome.enabled"]
kind = "bool"
default = true
parser_key = "welcome_enabled"
home_manager_option = "welcome_enabled"
parser_behavior = "direct"
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."welcome.style"]
kind = "string"
default = "random"
parser_key = "welcome_style"
home_manager_option = "welcome_style"
parser_behavior = "direct"
validation = "enum"
allowed_values = [
  "static",
  "logo",
  "boids",
  "boids_predator",
  "boids_schools",
  "mandelbrot",
  "game_of_life_gliders",
  "game_of_life_oscillators",
  "game_of_life_bloom",
  "random",
]
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."welcome.duration_seconds"]
kind = "int"
default = 3
parser_key = "welcome_duration_seconds"
home_manager_option = "welcome_duration_seconds"
parser_behavior = "direct"
validation = "int_range"
min = 1
max = 60
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."popup.side_margin"]
kind = "int"
default = 1
parser_key = "popup_side_margin"
home_manager_option = "popup_side_margin"
parser_behavior = "direct"
validation = "int_range"
min = 0
max = 1000
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."popup.vertical_margin"]
kind = "int"
default = 0
parser_key = "popup_vertical_margin"
home_manager_option = "popup_vertical_margin"
parser_behavior = "direct"
validation = "int_range"
min = 0
max = 1000
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."keybindings.config"]
kind = "string"
default = "Alt Shift K"
parser_key = "keybinding_config"
home_manager_option = "keybinding_config"
parser_behavior = "direct"
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."keybindings.agent"]
kind = "string"
default = "Alt Shift L"
parser_key = "keybinding_agent"
home_manager_option = "keybinding_agent"
parser_behavior = "direct"
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."keybindings.git"]
kind = "string"
default = "Alt Shift J"
parser_key = "keybinding_git"
home_manager_option = "keybinding_git"
parser_behavior = "direct"
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."keybindings.menu"]
kind = "string"
default = "Alt Shift M"
parser_key = "keybinding_menu"
home_manager_option = "keybinding_menu"
parser_behavior = "direct"
rebuild_required = false
apply_mode = "tab_session_restart"

[fields."bar.widgets"]
kind = "string_list"
default = ["editor", "shell", "term", "codex_usage", "cpu", "ram"]
parser_key = "zellij_widget_tray"
home_manager_option = "bar_widgets"
parser_behavior = "direct"
validation = "enum_string_list"
allowed_values = [
  "session",
  "editor",
  "shell",
  "term",
  "claude_usage",
  "codex_usage",
  "opencode_go_usage",
  "cpu",
  "ram",
]
rebuild_required = false
apply_mode = "tab_session_restart"
