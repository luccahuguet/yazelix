# Canonical machine-readable metadata for the main Yazelix config surface.
# This artifact is intentionally about semantics, not user-facing prose.
#
# Notes:
# - It covers the main config surface only. Pack metadata lives separately.
# - `parser_behavior` documents the parser-side transform when it differs from
#   the raw TOML value shape.
# - `home_manager_default_is_null` and `home_manager_can_omit` capture the main
#   places where Home Manager semantics differ from the emitted TOML template.

[contract]
version = 1
surface = "main"
field_count = 36
artifact_role = "canonical_machine_metadata"
default_template = "yazelix_default.toml"
home_manager_module = "home_manager/module.nix"
loader_module = "nushell/scripts/utils/config_contract.nu"
scope_note = "Pack-surface metadata is intentionally excluded from this artifact."

[rebuild]
extra_paths = []

[fields."core.debug_mode"]
kind = "bool"
default = false
parser_key = "debug_mode"
home_manager_option = "debug_mode"
parser_behavior = "direct"
rebuild_required = false

[fields."core.skip_welcome_screen"]
kind = "bool"
default = false
parser_key = "skip_welcome_screen"
home_manager_option = "skip_welcome_screen"
parser_behavior = "direct"
rebuild_required = false

[fields."core.show_macchina_on_welcome"]
kind = "bool"
default = true
parser_key = "show_macchina_on_welcome"
home_manager_option = "show_macchina_on_welcome"
parser_behavior = "direct"
rebuild_required = false

[fields."core.game_of_life_cell_style"]
kind = "string"
default = "full_block"
parser_key = "game_of_life_cell_style"
home_manager_option = "game_of_life_cell_style"
parser_behavior = "direct"
validation = "enum"
allowed_values = [
  "full_block",
  "dotted",
]
rebuild_required = false

[fields."core.welcome_style"]
kind = "string"
default = "random"
parser_key = "welcome_style"
home_manager_option = "welcome_style"
parser_behavior = "direct"
validation = "enum"
allowed_values = [
  "static",
  "logo",
  "boids",
  "boids_predator",
  "boids_schools",
  "mandelbrot",
  "game_of_life_gliders",
  "game_of_life_oscillators",
  "game_of_life_bloom",
  "random",
]
rebuild_required = false

[fields."core.welcome_duration_seconds"]
kind = "float"
default = 2.0
parser_key = "welcome_duration_seconds"
home_manager_option = "welcome_duration_seconds"
parser_behavior = "direct"
validation = "float_range"
min = 0.2
max = 8.0
rebuild_required = false

[fields."helix.runtime_path"]
kind = "string"
default = ""
parser_key = "helix_runtime_path"
home_manager_option = "helix_runtime_path"
parser_behavior = "empty_string_to_null"
nullable = true
emit_in_default_template = false
home_manager_default_is_null = true
home_manager_can_omit = true
rebuild_required = true

[fields."editor.command"]
kind = "string"
default = ""
parser_key = "editor_command"
home_manager_option = "editor_command"
parser_behavior = "empty_string_to_null"
nullable = true
home_manager_default_is_null = true
rebuild_required = true

