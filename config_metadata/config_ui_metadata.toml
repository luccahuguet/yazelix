# User-facing metadata for the Yazelix config UI.
# Parser semantics live in main_config_contract.toml. Field tables here own the
# tab placement and help text consumed by the current config UI.

tab_order = [
  "general",
  "workspace",
  "editor",
  "terminal",
  "appearance",
  "cursors",
  "status_bar",
  "file_manager",
  "keybindings",
  "shell",
  "advanced",
]

[tabs.general]
label = "general"
help = "Startup, welcome screen, and general Yazelix behavior"

[tabs.workspace]
label = "workspace"
help = "Pane, popup, and Zellij workspace behavior"

[tabs.editor]
label = "editor"
help = "Editor command and Helix integration"

[tabs.terminal]
label = "terminal"
help = "Mars native configuration"

[tabs.appearance]
label = "appearance"
help = "Terminal-owned appearance; edit Mars values from the terminal tab"

[tabs.cursors]
label = "cursors"
help = "Cursor presets, effects, and cursor registry"

[tabs.status_bar]
label = "status_bar"
help = "Status bar widgets, labels, and AI usage displays"

[tabs.file_manager]
label = "file_manager"
help = "Yazi command, plugins, theme, and sorting behavior"

[tabs.keybindings]
label = "keybindings"
help = "Managed surface chords and native keymap ownership"

[tabs.shell]
label = "shell"
help = "Default shell and generated shell hook surfaces"

[tabs.advanced]
label = "advanced"
help = "Diagnostics and low-level settings most users should not need"

[fields."open.log_level"]
tab = "advanced"
help = "Choose diagnostics written for managed Yazi open requests"

[fields."shell.program"]
tab = "shell"
help = "Choose the packaged shell launched in new Yazelix panes"

[fields."editor.command"]
tab = "editor"
help = "Choose the editor executable used by managed Yazi opens"

[fields."agent.command"]
tab = "workspace"
help = "Choose auto provider discovery or one executable for the managed agent surface"

[fields."agent.args"]
tab = "workspace"
help = "Set arguments passed to a custom agent command"

[fields."welcome.enabled"]
tab = "general"
help = "Show the startup welcome splash before entering the managed runtime"

[fields."welcome.style"]
tab = "general"
help = "Choose the welcome animation, or randomize among supported styles"

[fields."welcome.duration_seconds"]
tab = "general"
help = "Set the welcome splash duration in whole seconds"

[fields."popup.side_margin"]
tab = "workspace"
help = "Set the left and right cell margin for Nova managed popups"

[fields."popup.vertical_margin"]
tab = "workspace"
help = "Set the top and bottom cell margin for Nova managed popups"

[fields."keybindings.config"]
tab = "keybindings"
help = "Set the chord that toggles the managed config popup"

[fields."keybindings.agent"]
tab = "keybindings"
help = "Set the chord that opens the managed agent surface"

[fields."keybindings.git"]
tab = "keybindings"
help = "Set the chord that toggles the managed Git popup"

[fields."keybindings.menu"]
tab = "keybindings"
help = "Set the chord that toggles the managed command palette popup"

[fields."bar.widgets"]
tab = "status_bar"
help = "Choose the Nova top-bar widget order"

[fields."cursors.schema_version"]
tab = "cursors"
help = "Internal cursor schema version used by Yazelix"

[fields."cursors.enabled_cursors"]
tab = "cursors"
help = "Choose which Yazelix cursor presets are generated"

[fields."cursors.settings.trail"]
tab = "cursors"
help = "Choose the cursor preset used as the active trail cursor"

[fields."cursors.settings.trail_effect"]
tab = "cursors"
help = "Choose how the cursor trail animates between positions"

[fields."cursors.settings.mode_effect"]
tab = "cursors"
help = "Choose the animation used when cursor mode changes"

[fields."cursors.settings.glow"]
tab = "cursors"
help = "Choose the Ghostty cursor glow intensity"

[fields."cursors.settings.duration"]
tab = "cursors"
help = "Set cursor animation duration in seconds"

[fields."cursors.settings.kitty_enable_cursor"]
tab = "cursors"
help = "Enable cursor shader generation for Kitty-compatible cursor config"

[fields."cursors.cursor"]
tab = "cursors"
help = "Edit the cursor preset registry used by generated Ghostty cursor configs"

