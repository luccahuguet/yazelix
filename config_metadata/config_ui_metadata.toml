# User-facing metadata for the Yazelix config UI.
# Parser semantics live in main_config_contract.toml; this file owns labels,
# grouping, editor affordances, and UI-only lifecycle notes.

tab_order = [
  "general",
  "workspace",
  "editor",
  "terminal",
  "appearance",
  "cursors",
  "status_bar",
  "file_manager",
  "keybindings",
  "shell",
  "advanced",
]

[tabs.general]
label = "general"
help = "Startup, welcome screen, and general Yazelix behavior"

[tabs.workspace]
label = "workspace"
help = "Pane, popup, and Zellij workspace behavior"

[tabs.editor]
label = "editor"
help = "Editor command, sidebar behavior, and Helix integration"

[tabs.terminal]
label = "terminal"
help = "Terminal emulator selection and generated terminal configs"

[tabs.appearance]
label = "appearance"
help = "Theme, chrome, transparency, and screen saver presentation"

[tabs.cursors]
label = "cursors"
help = "Ghostty cursor presets, effects, and cursor registry"

[tabs.status_bar]
label = "status_bar"
help = "Status bar widgets, labels, and AI usage displays"

[tabs.file_manager]
label = "file_manager"
help = "Yazi command, plugins, theme, and sorting behavior"

[tabs.keybindings]
label = "keybindings"
help = "Future action and keybinding ownership controls"

[tabs.shell]
label = "shell"
help = "Default shell and generated shell hooks"

[tabs.advanced]
label = "advanced"
help = "Low-level runtime paths and settings most users should not need"

