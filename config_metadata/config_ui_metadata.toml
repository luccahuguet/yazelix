# User-facing metadata for the Yazelix config UI.
# Parser semantics live in main_config_contract.toml. Field tables here own the
# tab placement and help text consumed by the current config UI.

tab_order = [
  "general",
  "workspace",
  "editor",
  "terminal",
  "appearance",
  "cursors",
  "status_bar",
  "file_manager",
  "keybindings",
  "shell",
  "advanced",
]

[tabs.general]
label = "general"
help = "Startup, welcome screen, and general Yazelix behavior"

[tabs.workspace]
label = "workspace"
help = "Pane, popup, and Zellij workspace behavior"

[tabs.editor]
label = "editor"
help = "Editor command and Helix integration"

[tabs.terminal]
label = "terminal"
help = "Mars native configuration"

[tabs.appearance]
label = "appearance"
help = "Theme, chrome, and screen saver presentation"

[tabs.cursors]
label = "cursors"
help = "Cursor presets, effects, and cursor registry"

[tabs.status_bar]
label = "status_bar"
help = "Status bar widgets, labels, and AI usage displays"

[tabs.file_manager]
label = "file_manager"
help = "Yazi command, plugins, theme, and sorting behavior"

[tabs.keybindings]
label = "keybindings"
help = "Future action and keybinding ownership controls"

[tabs.shell]
label = "shell"
help = "Default shell and generated shell hook surfaces"

[tabs.advanced]
label = "advanced"
help = "Low-level runtime paths and settings most users should not need"

