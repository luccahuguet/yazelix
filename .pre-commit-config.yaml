repos:
  - repo: local
    hooks:
      - id: yazelix-validate-syntax
        name: validate Nushell syntax
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_core --bin yzx_repo_validator -- validate-nushell-syntax --quiet
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-readme-version
        name: validate generated README surface
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_core --bin yzx_repo_validator -- validate-readme-version
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-upgrade-contract
        name: validate upgrade contract
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_core --bin yzx_repo_validator -- validate-upgrade-contract
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-config-surface-contract
        name: validate config surface and launch-profile contract
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_core --bin yzx_repo_validator -- validate-config-surface-contract
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-specs
        name: validate spec traceability
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_core --bin yzx_repo_validator -- validate-specs
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-default-test-traceability
        name: validate default-suite traceability
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_core --bin yzx_repo_validator -- validate-default-test-traceability
        language: system
        pass_filenames: false
        always_run: true
