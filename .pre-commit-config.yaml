repos:
  - repo: local
    hooks:
      - id: yazelix-validate-syntax
        name: validate Nushell syntax
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-nushell-syntax --quiet
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-readme-version
        name: validate generated README surface
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-readme-version
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-upgrade-contract
        name: validate upgrade contract
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-upgrade-contract
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-config-surface-contract
        name: validate config surface and launch-profile contract
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-config-surface-contract
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-contracts
        name: validate contracts
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-contracts
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-default-test-traceability
        name: validate default-suite traceability
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-default-test-traceability
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-validate-rust-test-traceability
        name: validate Rust test traceability
        entry: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-rust-test-traceability
        language: system
        pass_filenames: false
        always_run: true
      - id: yazelix-rustfmt-core
        name: check Rust formatting (core)
        entry: nix develop -c rustfmt --edition 2024 --check
        language: system
        files: ^rust_core/.*\.rs$
      - id: yazelix-rustfmt-pane-orchestrator
        name: check Rust formatting (pane orchestrator)
        entry: nix develop -c rustfmt --edition 2021 --check
        language: system
        files: ^rust_plugins/zellij_pane_orchestrator/.*\.rs$
