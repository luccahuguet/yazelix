[package]
name = "yazelix_core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "yzx_core"
path = "src/bin/yzx_core.rs"

[[bin]]
name = "yzx_control"
path = "src/bin/yzx_control.rs"

[[bin]]
name = "yzx"
path = "src/bin/yzx.rs"

[dependencies]
crossterm = "0.29"
directories = "5.0.1"
jsonc-parser = { version = "0.32.3", features = ["cst", "serde"] }
lexopt = "0.3"
ratatui = { version = "0.30.0", default-features = false, features = ["crossterm_0_29"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
time = { version = "0.3", features = ["formatting", "local-offset", "macros"] }
thiserror = "2.0"
toml = "0.9"
yazelix_ghostty_cursors = { git = "https://github.com/luccahuguet/yazelix-ghostty-cursors", rev = "9b7224eda13ff974f318ced4cc3d3bebc64076da" }
yazelix_ratconfig = { package = "yazelix-ratconfig", git = "https://github.com/luccahuguet/yazelix-ratconfig", rev = "90b0609333b9c03395cff40366d1efec058a0ff1" }
yazelix_screen = { git = "https://github.com/luccahuguet/yazelix-screen", rev = "15017633407e039a5c4777bc8883944524ee4d81" }

[dev-dependencies]
assert_cmd = "2.0"
pretty_assertions = "1.4"
tempfile = "3.10"
toml = "0.9"
