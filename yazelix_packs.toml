# Yazelix Pack Configuration (TOML format)
# Keep pack enablement and declarations here so `yazelix.toml` stays focused on
# core Yazelix behavior.
#
# For the full pack catalog, usage notes, and examples, see:
#   docs/yazelix_collection.md

# Enable packs by name. Uncomment the packs you want from [declarations] below.
enabled = [
  # "ai_agents",
  # "ai_tools",
  # "config",
  # "file-management",
  # "git",
  # "jj",
  # "maintainer",
  # "python",
  # "rust",
  # "rust_maintainer",
  # "nix",
  # "ts",
  # "writing",
  # "go",
  # "kotlin",
]

# Add individual packages here if you want a few tools without enabling a full pack.
# Package names must exist in nixpkgs:
#   https://search.nixos.org/packages
user_packages = [
  # "atuin",
  # "gleam",
]

[declarations]
# Pack declarations are lists of package names.
# AI-related entries resolve from llm-agents.nix; the rest come from nixpkgs.

ai_agents = [
  "claude-code",    # Claude Code CLI
  "codex",          # Codex CLI
  "justcode",       # just-every/code
  "gemini-cli",     # Gemini CLI
  "pi",             # Pi coding agent
  "opencode",       # OpenCode CLI
  "amp",            # Amp coding agent
  "cursor-agent",   # Cursor agent
  "goose-cli",      # Goose CLI
  "tru",            # TOON CLI for compact Beads/agent output
]

ai_tools = [
  "coderabbit-cli",   # AI code review
  "ccusage",          # Claude Code usage tracker
  "ccusage-amp",      # Amp usage tracker
  "ccusage-codex",    # Codex usage tracker
  "ccusage-opencode", # OpenCode usage tracker
  "beads",            # Original Beads tracker (bd)
  "beads-rust",       # Rust Beads tracker (br)
  "beads-viewer",     # Beads Viewer (bv)
  "openclaw",         # OpenClaw
  "picoclaw",         # PicoClaw
  "zeroclaw",         # ZeroClaw
]

# Add unfree nixpkgs packages here if needed.
# unfree = []

config = [
  "mpls", # Markdown Preview LSP
  "yaml-language-server", # YAML language server
]

file-management = [
  "ouch", # Archive handling
  "erdtree", # Tree view with file sizes
  "serpl", # Search/replace CLI
]

git = [
  "onefetch", # Repo summary and stats
  "gh", # GitHub CLI
  "prek", # Fast local pre-commit hook runner
]

jj = [
  "jujutsu", # Jujutsu VCS (jj)
  "lazyjj", # LazyGit-style TUI for jj
  "jjui", # TUI for Jujutsu VCS
]

maintainer = [
  "gh", # GitHub CLI for repo maintenance
  "prek", # Fast local pre-commit hook runner
  "tru", # Compact Beads/agent structured output CLI
  "beads-rust", # Rust Beads tracker (br)
  "beads-viewer", # Beads Viewer (bv)
  "rust_wasi_toolchain", # WASI-capable Rust toolchain for plugin rebuilds
]

python = [
  "ruff", # Fast Python linter/formatter
  "uv", # Ultra-fast Python package manager
  "ty", # Fast Python type checker
  "python3Packages.ipython", # Enhanced Python REPL
]

rust = [
  "rust_toolchain", # Stable Rust toolchain with cargo, rustc, rustfmt, clippy
  "cargo-edit", # Add/remove/upgrade Rust deps
  "cargo-watch", # Rebuild on file changes
  "cargo-nextest", # Next-gen Rust test runner
  "cargo-audit", # Security audit for Rust deps
]

rust_maintainer = [
  "cargo-update", # Update installed cargo binaries
  "cargo-binstall", # Faster install of Rust tools
]

rust_wasi = [
  "rust_wasi_toolchain", # Rust toolchain with wasm32-wasip1 for plugin builds
]

nix = [
  "nil", # Nix language server
  "nixd", # Nix language server with diagnostics
  "nixfmt", # Nix formatter
]

ts = [
  "nodePackages.typescript-language-server", # TypeScript language server
  "tailwindcss-language-server", # Tailwind CSS language server
  "biome", # JS/TS formatter and linter
  "oxlint", # Fast JS/TS linter
]

modern_js = [
  "bun", # JS runtime, package manager, bundler, and test runner
  "deno", # JS/TS runtime with first-class tooling
]

go = [
  "gopls", # Go language server
  "golangci-lint", # Fast Go linter aggregator
  "delve", # Go debugger
  "govulncheck", # Go vulnerability scanner
]

kotlin = [
  "kotlin-language-server", # Kotlin language server
  "ktlint", # Kotlin linter/formatter
  "detekt", # Kotlin static analysis
  "gradle", # Build tool for Kotlin/JVM
]

writing = [
  "typst",           # Typst compiler, formatter, and language server
  "tinymist",        # Full-featured Typst language server
  "pandoc",          # Universal document converter
  "markdown-oxide",  # Markdown PKM language server
]
