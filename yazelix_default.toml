# Yazelix default configuration template
# This file feeds the generated ~/.config/yazelix/settings.jsonc surface.
# Do not use old mutable yazelix.toml files as runtime config inputs.
#
# Note: Most configuration changes require restarting Yazelix to take effect.

[core]
debug_mode = false  # Enable verbose debug logging in the shellHook
skip_welcome_screen = false  # When true, welcome info is logged instead of displayed
show_macchina_on_welcome = true  # Show system info on welcome screen (uses macchina)
welcome_style = "random"  # Welcome style: "static", "logo", "boids", "boids_predator", "boids_schools", "mandelbrot", "game_of_life_gliders", "game_of_life_oscillators", "game_of_life_bloom", or "random" (never picks "static" or "logo")
game_of_life_cell_style = "full_block"  # Game of Life cell style: "full_block" or "dotted" (braille scale 4)
welcome_duration_seconds = 2.0  # Welcome animation duration in seconds for animated styles; logo ignores this and keeps its fixed timing (0.2 to 8.0)

[helix]
# Helix runtime path (advanced users only)
# ONLY set this if editor_command points to a custom Helix build
# The runtime MUST exactly match your Helix binary version to avoid errors
#
# Common scenarios:
# • Development build: "/home/user/helix/runtime"
# • Custom install: "/opt/helix/share/helix/runtime"
# • System package: "/usr/share/helix/runtime"
#
# To find your runtime: ls $(dirname $(which hx))/../share/helix/runtime
# If this path doesn't exist, your Helix may be incompatible
# runtime_path = "/path/to/custom/helix/runtime"

[editor]
# editor_command options:
# • null (recommended): Use yazelix's Nix-provided Helix
#   - Eliminates runtime conflicts with existing Helix installations
#   - Binary and runtime are perfectly matched
#   - Full yazelix integration features (reveal in the Yazi file tree, same-instance opening, pane detection)
#
# • "nvim": Use Neovim (first-class support)
#   - Full yazelix integration features (reveal in the Yazi file tree, same-instance opening, pane detection)
#   - Requires keybinding setup - see docs/neovim_keybindings.md
#   - Works with your existing Neovim configuration
#
# • "hx": Use your system Helix from PATH
#   - Requires setting helix_runtime_path to match your Helix version
#   - Full yazelix integration if runtime matches
#   - Use this if you have a custom Helix build you prefer
#
# • Other editors: "vim", "nano", "emacs", "kak", etc.
#   - Basic integration only (new panes, tab naming)
#   - No advanced features (reveal in the Yazi file tree, same-instance opening)
#   - Works reliably but with limited yazelix-specific functionality
command = ""  # Leave empty to use yazelix's helix (recommended), or set to "nvim", "hx", "vim", etc.

# Hide the managed sidebar after opening a file from Yazi (default: false)
# This keeps new tabs starting with the Yazi sidebar visible, then hides it
# after the file-open workflow hands control to the editor
hide_sidebar_on_file_open = false

# Sidebar width when the Yazi file-tree sidebar is open (default: 20)
# Valid range: 10 to 40 percent
# Higher values give Yazi more room but reduce editor space
sidebar_width_percent = 20

# Sidebar terminal command and arguments.
# The default launches Yazelix's managed Yazi file-tree sidebar adapter.
# Advanced users can point this at another terminal side surface; the pane is
# still owned by Yazelix as the managed "sidebar" pane.
# If sidebar_command changes and sidebar_args stays at this default, Yazelix
# runs the custom sidebar command with no inherited Yazi launcher argument.
sidebar_command = "nu"
sidebar_args = [
  "__YAZELIX_RUNTIME_DIR__/configs/zellij/scripts/launch_sidebar_yazi.nu",
]

[shell]
# Default shell for Zellij: "nu", "bash", "fish", or "zsh" (default: "nu")
# The selected shell must be available in the installed Yazelix runtime or host PATH.
default_shell = "nu"

[terminal]
# Terminal emulator preference list (ordered)
# The first entry is the primary terminal used for launch; the rest are fallbacks.
# Options: "ghostty", "wezterm", "kitty", "alacritty", "foot" (Linux-only)
#
# Default policy:
# - Package/Home Manager installs use the Ghostty runtime variant by default
#   so Yazelix cursor trails and Ghostty config effects are part of the first run.
# - WezTerm remains available through #yazelix_wezterm or
#   programs.yazelix.runtime_variant = "wezterm" for users who prefer its
#   image-preview behavior.
# - Kitty and Alacritty are supported PATH-provided alternatives.
# - Foot: supported Linux-only PATH-provided alternative
#
# Auto-detection fallback order matches this list.
# Ghostty is the default visual identity; WezTerm is the best image-preview path.
terminals = [
  "ghostty",
  "wezterm",
  # "kitty",
  # "alacritty",
  # "foot",
]

# Terminal config mode (how Yazelix handles terminal emulator configs)
# Options:
# - "yazelix": Use Yazelix-managed configs under ~/.local/share/yazelix/configs/terminal_emulators
# - "user":    Load the terminal's native user config path instead; this requires that the real config file already exists
# Supported customization path: keep "yazelix" and add terminal-native tweaks under ~/.config/yazelix/terminal_<terminal>.<ext>
config_mode = "yazelix"

# Terminal transparency level (default: "medium")
# Options: "none", "very_low", "low", "medium", "high", "very_high", "super_high"
# - "none":       No transparency (opacity = 1.0)
# - "very_low":   Minimal transparency (opacity = 0.95)
# - "low":        Light transparency (opacity = 0.90)
# - "medium":     Medium transparency (opacity = 0.85)
# - "high":       High transparency (opacity = 0.80)
# - "very_high":  Very high transparency (opacity = 0.70)
# - "super_high": Maximum transparency (opacity = 0.60)
transparency = "medium"

[zellij]
# Disable Zellij tips popup on startup (default: true)
# It is recommended to set this to false, so you learn more about zellij
disable_tips = true

# Show Zellij pane frames (default: true)
pane_frames = true

# Enable rounded corners for Zellij pane frames (default: true)
rounded_corners = true

# Enable Kitty keyboard protocol in Zellij (default: false)
# Disable if dead keys stop working in your terminal (e.g. Ghostty)
support_kitty_keyboard_protocol = false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CROSS-COMPATIBLE THEMES (Zellij + Yazi + Helix)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# These 9 themes work across all three programs (accounting for name variations):
#
#   catppuccin-frappe, catppuccin-latte, catppuccin-macchiato,
#   dracula, gruvbox-dark, kanagawa, nord, ayu-dark, tokyo-night
#
# For consistent theming, set the same theme in:
#   - [zellij] theme (below)
#   - [yazi] theme (further down)
#   - Helix: Add to ~/.config/helix/config.toml → theme = "dracula"
#
# Note: Helix uses underscores in theme names (e.g., catppuccin_frappe)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Zellij theme (default: "default")
# Special: "random" - picks a different random theme on every yazelix restart
# Dark themes (28): ansi, ao, atelier-sulphurpool, ayu_mirage, ayu_dark, catppuccin-frappe,
#   catppuccin-macchiato, cyber-noir, blade-runner, retro-wave, dracula, everforest-dark,
#   gruvbox-dark, iceberg-dark, kanagawa, lucario, menace, molokai-dark, night-owl, nightfox,
#   nord, one-half-dark, onedark, solarized-dark, tokyo-night-dark, tokyo-night-storm,
#   tokyo-night, vesper
# Light themes (9): ayu_light, catppuccin-latte, everforest-light, gruvbox-light,
#   iceberg-light, dayfox, pencil-light, solarized-light, tokyo-night-light
# See: https://zellij.dev/documentation/theme-list.html
theme = "default"

# Zjstatus widget tray (right side of status bar)
# Available widgets: "editor", "shell", "term", "workspace", "cursor", "claude_usage", "codex_usage", "opencode_go_usage", "cpu", "ram"
# Configure usage widget display below
# Dynamic widgets read from a window-local cache so multiple Yazelix windows keep independent facts
# Comment out any line to hide that widget
widget_tray = [
  "editor",  # Active editor
  "shell",  # Active shell
  "term",  # Terminal emulator
  "cursor", # Active Ghostty cursor preset (mono █, split ▌/▀, n/a outside Yazelix Ghostty)
  # "workspace", # Active workspace root name
  # "claude_usage", # Combined Claude 5h/week usage and quota
  "codex_usage", # Codex 5h/week reset timing and quota
  # "opencode_go_usage", # Combined OpenCode Go 5h/week/month usage and quota
  "cpu",  # CPU usage
  "ram",  # RAM usage
]

# Tab label mode (left side of status bar)
# Options:
# - "full":    show tab index and tab name, e.g. [1] project
# - "compact": show tab index and state indicators only, e.g. [1]
# Compact is useful when workspace/root widgets already show the project name
tab_label_mode = "full"

# Claude usage display: "token", "quota", or "both"
claude_usage_display = "both"

# Codex usage display: "token", "quota", or "both"
codex_usage_display = "quota"

# OpenCode Go usage display: "token", "quota", or "both"
opencode_go_usage_display = "both"

# OpenCode Go usage windows: "5h", "week", or "month"
opencode_go_usage_periods = ["5h", "week", "month"]

# Claude usage windows: "5h" or "week"
claude_usage_periods = ["5h", "week"]

# Optional short badge shown just before the YAZELIX version segment in zjstatus.
# Empty by default. Whitespace is trimmed and the rendered text is capped at 8 characters.
custom_text = ""

# Default transient popup command for Zellij floating-pane launches.
# This powers `yzx popup` and the default popup keybinding.
# Use an argv-style list, not a shell string.
# Examples:
#   ["lazygit"]
#   ["editor"]                  # Open the current Yazelix editor.command with its managed runtime/env
#   ["codex"]
#   ["opencode"]
popup_program = [
  "lazygit",
]

# Width and height of the managed popup as percentages of the current tab.
# Valid range: 1 to 100.
popup_width_percent = 90
popup_height_percent = 90

# Optional full-tab idle screen driven by the pane orchestrator.
# Disabled by default. When enabled, Yazelix opens `yzx screen` after the idle threshold.
screen_saver_enabled = false
screen_saver_idle_seconds = 300
screen_saver_style = "random"

# Startup mode for new Zellij sessions (default: "normal")
# Keep "normal" for the standard Yazelix experience.
# Use "locked" only if you explicitly want Zellij to start locked for other TUIs.
# Options: "normal", "locked"
default_mode = "normal"

[zellij.native_keybindings]
# Curated native Zellij key policy used by Yazelix.
# Each value is a list of Zellij key strings. Set an entry to [] to disable
# that native bind/unbind. Arbitrary native Zellij keymaps still belong in
# ~/.config/yazelix/zellij.kdl.

# Move tab left/right away from Helix selection keys.
move_tab_left_unbind = ["Alt i"]
move_tab_left = ["Alt Shift H"]
move_tab_right_unbind = ["Alt o"]
move_tab_right = ["Alt Shift L"]

# Leave Alt+n available to Helix selection flow instead of Zellij new-pane.
new_pane_unbind = ["Alt n"]

# Direct tab jumps.
go_to_tab_1 = ["Alt 1"]
go_to_tab_2 = ["Alt 2"]
go_to_tab_3 = ["Alt 3"]
go_to_tab_4 = ["Alt 4"]
go_to_tab_5 = ["Alt 5"]
go_to_tab_6 = ["Alt 6"]
go_to_tab_7 = ["Alt 7"]
go_to_tab_8 = ["Alt 8"]
go_to_tab_9 = ["Alt 9"]

# Convenience native Zellij navigation.
toggle_focus_fullscreen = ["Alt Shift F"]
previous_tab = ["Alt q"]
next_tab = ["Alt w"]

# Terminal-specific Helix selection-cycle conflict workaround.
selection_cycle_unbind = ["Alt (", "Alt )"]

# Move pane grouping away from Helix sibling selection.
toggle_pane_in_group_unbind = ["Alt p"]
toggle_pane_in_group = ["Ctrl Alt p"]
toggle_group_marking = ["Ctrl Alt Shift P"]

# Move locked mode away from Ctrl+g in normal/default modes for CLI prompt flows.
locked_mode_unbind = ["Ctrl g"]
locked_mode = ["Ctrl Alt g"]

# Move scroll mode away from Ctrl+s because Ctrl+s is terminal/editor-hostile.
scroll_mode_unbind = ["Ctrl s"]
scroll_mode = ["Ctrl Alt s"]

# Move session mode away from Ctrl+o because it conflicts with editor workflows.
session_mode_unbind = ["Ctrl o"]
session_mode = ["Ctrl Alt o"]

# Keep Ctrl+b available to shells/editors instead of Zellij tmux mode.
tmux_mode_unbind = ["Ctrl b"]

[zellij.keybindings]
# Semantic remaps for Yazelix-owned Zellij actions.
# Each value is a list of Zellij key strings. Set an action to [] to disable
# that Yazelix-owned binding. Native Zellij keybind ownership still belongs in
# ~/.config/yazelix/zellij.kdl.
open_workspace_terminal = ["Alt m"]
popup = ["Alt t"]
menu = ["Alt Shift M"]
config = ["Alt Shift C"]
move_focus_left_or_tab = ["Alt h", "Alt Left"]
move_focus_right_or_tab = ["Alt l", "Alt Right"]
toggle_editor_sidebar_focus = ["Ctrl y"]
toggle_sidebar = ["Alt y"]
smart_reveal = ["Alt r"]
previous_family = ["Alt ["]
next_family = ["Alt ]"]

[yazi]
# Custom Yazi binary override.
# Leave empty to use `yazi` from PATH.
# Set this only when you want Yazelix-managed Yazi launches to use a specific binary.
command = ""

# Custom `ya` CLI override used for sidebar sync and reveal actions.
# Leave empty to use `ya` from PATH.
ya_command = ""

# Plugins to load (core plugins auto-layout and sidebar-status are always loaded)
#
# Bundled plugins (shipped with yazelix, always available):
#   - git: Git status integration (shows file changes in listings)
#   - starship: Display Starship prompt in Yazi header (shows git branch, venv, etc.)
#   - lazygit: Launch lazygit from yazi (invoked via 'gl' keybinding, not loaded in init.lua)
#
# To add external plugins:
#   1. Install with yazi's package manager: ya pkg add owner/repo
#   2. Add plugin name to the list below (without .yazi extension)
#
# Examples:
#   ya pkg add XYenon/clipboard.yazi    → plugins = ["git", "starship", "clipboard"]
#   ya pkg add yazi-rs/plugins:session  → plugins = ["git", "starship", "session"]
#
# Browse available plugins: https://yazi-rs.github.io/docs/resources
#
# To disable bundled plugins: plugins = []
plugins = [
  "git",
  "starship",
]

# Yazi theme (flavor) configuration
# Special options: "random-dark" / "random-light" pick from curated palettes (counts + names) in
# config_metadata/yazi_render_plan.toml — keep that file aligned when adding/removing bundled flavors.
# Browse bundled Yazelix flavors: https://github.com/luccahuguet/yazelix-yazi-assets/tree/main/flavors
theme = "default"

# Sort files by
# Options: "alphabetical", "natural", "modified", "created", "size"
# This value is the source of truth and overrides any sort_by in configs/yazi/user/yazi.toml
sort_by = "alphabetical"

[yazi.keybindings]
# Semantic remaps for Yazelix-owned Yazi integration actions.
# Each value is a list of generated Yazi bindings. Set an action to [] to disable
# that Yazelix-owned binding. Native Yazi keymap ownership still belongs in
# ~/.config/yazelix/yazi_keymap.toml.
open_directory_as_workspace_pane = ["<A-p>"]
open_zoxide_in_editor = ["<A-z>"]

# Yazelix Classic v14 pack configuration does not belong to the trimmed v15 core config surface.
