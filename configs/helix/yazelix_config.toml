# Yazelix-managed Helix default.
# This is the curated editor experience for managed Yazelix Helix sessions.
# Users can override or delete any preference from ~/.config/yazelix/helix/config.toml.

theme = "ayu_evolve"

[editor]
# Keep common editor feedback visible without requiring users to discover each knob.
auto-format = true
bufferline = "always"
color-modes = true
cursorline = true
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert = "bar"

[editor.file-picker]
# Yazelix users often work inside repo/tooling trees where dotfiles matter.
hidden = true

[editor.indent-guides]
render = true

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.soft-wrap]
enable = true

[editor.statusline]
center = ["file-name"]
left = [
  "mode",
  "spinner",
  "version-control",
]
right = [
  "diagnostics",
  "selections",
  "position",
  "total-line-numbers",
  "position-percentage",
  "file-encoding",
]
separator = "│"

[keys.normal]
# Required for Yazelix's managed Yazi-to-Helix command transport.
":" = "command_mode"

# Reveal the current Helix buffer in the managed Yazi sidebar.
A-r = ':sh yzx reveal "%{buffer_name}"'

# Enter and Alt+Enter move like j/k, but land on the first non-whitespace.
A-ret = [
  "move_line_up",
  "goto_first_nonwhitespace",
]

# Ctrl+j and Ctrl+k move the current line or selected lines down/up.
C-j = [
  "extend_to_line_bounds",
  "delete_selection",
  "paste_after",
]
C-k = [
  "extend_to_line_bounds",
  "delete_selection",
  "move_line_up",
  "paste_before",
]
ret = [
  "move_line_down",
  "goto_first_nonwhitespace",
]

# Fast reload and navigation helpers.
C-r = [
  ":config-reload",
  ":reload",
]
X = "extend_line_up"
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"

[keys.normal.A-g]
# Small Git helpers that keep the terminal workflow in context.
b = ":sh git blame -L %{cursor_line},+1 %{buffer_name}"
l = ":sh git log --oneline -10 %{buffer_name}"
s = ":sh git status --porcelain"

[keys.normal.backspace]
# Utility prefix for Helix/Yazelix config and diagnostics.
c = ":config-open"
d = ":yank-diagnostic"
h = ":toggle-option file-picker.hidden"
i = ":toggle-option file-picker.git-ignore"
l = ":o ~/.config/yazelix/helix/languages.toml"

[keys.normal.g]
e = "goto_file_end"
