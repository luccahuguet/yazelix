# Yazelix semantic config
# Omit any field from ~/.config/yazelix/config.toml to inherit the packaged default

[open]
log_level = "info"

[shell]
program = "nu"

[editor]
command = "hx"

[agent]
command = "auto"
args = []

[welcome]
enabled = true
style = "random"
duration_seconds = 3

[popup]
side_margin = 1
vertical_margin = 0

[keybindings]
config = "Alt Shift K"
agent = "Alt Shift L"
git = "Alt Shift J"
menu = "Alt Shift M"

[bar]
widgets = ["editor", "shell", "term", "codex_usage", "cpu", "ram"]
