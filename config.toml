# Yazelix Next semantic config.
# Native tool configs live beside this file under ~/.config/yazelix-next/.

[open]
# yzn-open diagnostics: off, error, info, or debug.
log_level = "info"

[shell]
# Packaged shell for new Zellij panes: nu, bash, zsh, or fish.
program = "nu"

[editor]
# Editor command for managed opens. yzn-hx uses packaged Yazelix Helix.
command = "yzn-hx"

[welcome]
# Show a brief welcome splash before entering the managed runtime.
enabled = true
# Welcome style: static, logo, boids, boids_predator, boids_schools,
# mandelbrot, game_of_life_gliders, game_of_life_oscillators,
# game_of_life_bloom, or random.
style = "random"
# Welcome splash duration in seconds.
duration_seconds = 3

[popup]
# Left/right and top/bottom cell margins for managed popups.
side_margin = 1
vertical_margin = 0

[keybindings]
# Key chord that hides or shows the managed agent popup.
agent = "Alt Shift L"

[bar]
# Top bar widgets, left to right.
widgets = ["editor", "shell", "term", "codex_usage", "cpu", "ram"]
