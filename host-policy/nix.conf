# FlexNetOS/Yazelix strict local-build policy.
# This file is installed by the profile-owned yazelix_host_policy command.

always-allow-substitutes = false
compress-build-log = false
extra-experimental-features = nix-command flakes
flake-registry =
keep-build-log = false
max-jobs = auto
substitute = false
substituters =
trusted-public-keys =
trusted-substituters =
# Keep Nix's per-user profile at ~/.nix-profile with its own generation links,
# not under the user XDG state tree. With XDG base directories enabled, Nix
# re-materializes the retired user XDG profile selector on daemon activity,
# which the single-profile contract (legacy_xdg_inactive) forbids. Setting this
# false stops that retired selector from being created at all (no home shadow);
# the foundation profile already lives directly at ~/.nix-profile.
use-xdg-base-directories = false

!include nix.custom.conf
