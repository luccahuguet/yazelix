name: Issue
description: Report a bug, request a feature, or note something that needs work
body:
  - type: textarea
    id: diagnostics
    attributes:
      label: Yazelix diagnostics
      description: Run `yzx status --json` and paste the output. If Yazelix fails before status works, paste the full error, `yzx --version`, and the install command or flake revision you used
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe the problem, idea, or request
      placeholder: What happened, what should change, or what would you like to see?
    validations:
      required: true
