name: Work Item
description: Create a tracked work item that maps cleanly into Beads.
title: ""
labels: []
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      description: Choose the closest Beads issue type.
      options:
        - feature
        - task
        - bug
        - docs
        - question
        - epic
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short problem or outcome statement.
      placeholder: What should change?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why this matters, or what is currently wrong.
      placeholder: Current behavior, motivation, or surrounding context.
    validations:
      required: true

  - type: textarea
    id: direction
    attributes:
      label: Proposed Direction
      description: Initial design direction or constraints.
      placeholder: Suggested approach, boundaries, tradeoffs, or open questions.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete conditions that would make this done.
      placeholder: Bullet points or short checks are fine.
    validations:
      required: false
