name: Setup Nix Ubuntu
description: Shared Ubuntu setup for Yazelix CI jobs that need Nix

inputs:
  free_disk:
    description: Remove large preinstalled runner payloads before Nix work
    required: false
    default: "true"
  rust_cache:
    description: Restore the shared Rust validation build cache
    required: false
    default: "false"
  magic_nix_cache:
    description: Enable Magic Nix Cache for package-heavy smoke jobs
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Free runner disk space
      if: ${{ inputs.free_disk == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        sudo rm -rf \
          /opt/hostedtoolcache \
          /usr/local/lib/android \
          /usr/share/dotnet \
          /opt/ghc \
          /opt/az
        docker system prune --all --force --volumes || true

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v22
      with:
        determinate: false

    - name: Enable Nix cache
      if: ${{ inputs.magic_nix_cache == 'true' }}
      uses: DeterminateSystems/magic-nix-cache-action@main
      with:
        use-gha-cache: true
        use-flakehub: false

    - name: Cache Rust validation build artifacts
      if: ${{ inputs.rust_cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rust_core/target
        key: rust-validation-${{ runner.os }}-${{ hashFiles('rust_core/Cargo.lock', 'flake.lock') }}
        restore-keys: |
          rust-validation-${{ runner.os }}-
