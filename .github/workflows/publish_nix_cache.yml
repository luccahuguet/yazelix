name: Publish Nix Cache

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-nix-cache-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  publish_x86_64_linux:
    if: github.repository == 'luccahuguet/yazelix-next'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash

    steps:
      - name: Check Cachix token
        id: cachix-token
        run: |
          if [ -n "$CACHIX_AUTH_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::CACHIX_AUTH_TOKEN is not configured; skipping cache publish."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        if: steps.cachix-token.outputs.available == 'true'
        run: |
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/az
          docker system prune --all --force --volumes || true

      - name: Check out repository
        if: steps.cachix-token.outputs.available == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        if: steps.cachix-token.outputs.available == 'true'
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            max-jobs = 1
            cores = 2

      - name: Configure Cachix
        if: steps.cachix-token.outputs.available == 'true'
        uses: cachix/cachix-action@v17
        with:
          name: yazelix
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build and publish full, runtime, and Home Manager closures
        if: steps.cachix-token.outputs.available == 'true'
        run: |
          nix build --no-link --print-out-paths \
            .#packages.x86_64-linux.yzn \
            .#packages.x86_64-linux.runtime \
            .#checks.x86_64-linux.home_manager
