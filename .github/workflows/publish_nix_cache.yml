name: Publish Nix Cache

on:
  # Release tags point at the same commit as the main release bump. Publishing
  # from main caches those store paths once; tags remain release markers.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Main-branch cache publishing supersedes older cache runs for the same ref.
  # Manual runs keep their own group so they remain deliberate one-off probes.
  group: publish-nix-cache-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  publish_x86_64_linux:
    if: github.repository == 'luccahuguet/yazelix'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: yazelix
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build cache package outputs
        run: |
          nix build --no-link --print-out-paths \
            .#packages.x86_64-linux.br \
            .#packages.x86_64-linux.yazelix_kgp_zellij \
            .#packages.x86_64-linux.yazelix_helix \
            .#packages.x86_64-linux.yazelix \
            .#packages.x86_64-linux.yazelix_wezterm

  publish_aarch64_darwin:
    if: github.repository == 'luccahuguet/yazelix'
    runs-on: macos-15
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: yazelix
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build Darwin cache package outputs
        run: |
          nix build --no-link --print-out-paths \
            .#packages.aarch64-darwin.yazelix_kgp_zellij \
            .#packages.aarch64-darwin.yazelix_helix \
            .#packages.aarch64-darwin.yazelix
