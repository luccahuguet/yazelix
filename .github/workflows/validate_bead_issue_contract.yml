name: Validate Bead Issue Contract

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * *"

permissions:
  contents: read
  issues: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cache Rust validation build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: beads-contract-rust-${{ runner.os }}-${{ hashFiles('rust_core/Cargo.lock', 'flake.lock') }}
          restore-keys: |
            beads-contract-rust-${{ runner.os }}-

      # `br` is packaged in .#ci and published to the Yazelix Cachix cache.
      # Keep this workflow on the repo-owned package instead of compiling br
      # from crates.io on every scheduled contract check.
      - name: Verify pinned Beads tooling
        run: nix develop --accept-flake-config .#ci -c br version

      - name: Initialize Beads database
        run: nix develop --accept-flake-config .#ci -c br sync --import-only --rebuild --json

      - name: Validate contract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --accept-flake-config .#ci -c nu .github/scripts/validate_issue_bead_contract.nu
