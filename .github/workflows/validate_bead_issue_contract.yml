name: Validate Bead Issue Contract

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read
  issues: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      BR_VERSION: v0.1.31
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Install br
        run: |
          asset="br-${BR_VERSION}-linux_amd64.tar.gz"
          checksum="$asset.sha256"
          curl -fsSL -o /tmp/$asset "https://github.com/Dicklesworthstone/beads_rust/releases/download/${BR_VERSION}/${asset}"
          curl -fsSL -o /tmp/$checksum "https://github.com/Dicklesworthstone/beads_rust/releases/download/${BR_VERSION}/${checksum}"
          (
            cd /tmp
            sha256sum -c $checksum
          )
          tar -xzf /tmp/$asset -C /tmp
          install -m 0755 /tmp/br /usr/local/bin/br
          br --version

      - name: Validate contract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nu .github/scripts/validate_issue_bead_contract.nu
