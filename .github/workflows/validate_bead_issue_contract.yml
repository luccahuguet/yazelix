name: Validate Bead Issue Contract

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * *"

permissions:
  contents: read
  issues: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      BD_VERSION: v1.0.0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install bd
        run: |
          sudo apt-get update
          sudo apt-get install -y libicu-dev
          go install github.com/steveyegge/beads/cmd/bd@${BD_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          "$(go env GOPATH)/bin/bd" --version

      - name: Initialize Beads database
        run: bd init --from-jsonl --non-interactive --skip-agents --skip-hooks --quiet

      - name: Validate contract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nu .github/scripts/validate_issue_bead_contract.nu
