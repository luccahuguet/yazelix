name: Validate Bead Issue Contract

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * *"

permissions:
  contents: read
  issues: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      BD_VERSION: v1.0.0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Cache bd tooling
        uses: actions/cache@v5
        with:
          path: |
            ~/go/bin/bd
            ~/go/pkg/mod
            ~/.cache/go-build
          key: bd-${{ runner.os }}-${{ env.BD_VERSION }}
          restore-keys: |
            bd-${{ runner.os }}-

      - name: Install bd
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libicu-dev
          go_bin="$(go env GOPATH)/bin"
          mkdir -p "$go_bin"
          export PATH="$go_bin:$PATH"
          if ! command -v bd >/dev/null 2>&1; then
            go install github.com/steveyegge/beads/cmd/bd@${BD_VERSION}
          fi
          echo "$go_bin" >> "$GITHUB_PATH"
          bd --version

      - name: Initialize Beads database
        run: bd init --from-jsonl --non-interactive --skip-agents --skip-hooks --quiet

      - name: Validate contract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nu .github/scripts/validate_issue_bead_contract.nu
