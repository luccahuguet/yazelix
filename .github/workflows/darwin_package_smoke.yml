name: Darwin Package Smoke

on:
  schedule:
    # Monday 12:00 UTC. Skip the build when main had no commits in the last 7 days.
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: darwin-package-smoke
  cancel-in-progress: false

jobs:
  macos-package-smoke:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nushell
        uses: hustcer/setup-nu@v3

      - name: Decide whether to build
        id: decide
        run: |
          if "${{ github.event_name }}" == "workflow_dispatch" {
            "run=true" | save --append $env.GITHUB_OUTPUT
            print "Manual dispatch: always build"
          else
            let count = (^git rev-list --count --since="7 days ago" HEAD | into int)
            print $"Commits in the last 7 days: ($count)"
            if $count > 0 {
              "run=true" | save --append $env.GITHUB_OUTPUT
            } else {
              "run=false" | save --append $env.GITHUB_OUTPUT
              print "No commits in the last 7 days; skipping Darwin package build"
            }
          }

      - name: Install Nix
        if: steps.decide.outputs.run == 'true'
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            accept-flake-config = true
            max-jobs = 1
            cores = 2

      - name: Build aarch64-darwin packages and Home Manager closure
        if: steps.decide.outputs.run == 'true'
        run: |
          let full = (^nix build --no-link --no-write-lock-file --print-out-paths --print-build-logs .#packages.aarch64-darwin.yazelix | str trim)
          let runtime = (^nix build --no-link --no-write-lock-file --print-out-paths --print-build-logs .#packages.aarch64-darwin.runtime | str trim)
          ^nix build --no-link --no-write-lock-file --print-build-logs .#checks.aarch64-darwin.home_manager
          if ($"($full)/share/applications/yzx.desktop" | path exists) { error make {msg: "full Darwin package contains Linux desktop entry"} }
          if ($"($runtime)/share/applications/yzx.desktop" | path exists) { error make {msg: "runtime Darwin package contains Linux desktop entry"} }
