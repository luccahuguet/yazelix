name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * *"

permissions:
  contents: read

jobs:
  # Keep change detection inside the workflow, not in top-level path filters.
  # Required workflows that are skipped by path filters can leave checks pending.
  detect_integration_changes:
    runs-on: ubuntu-latest
    outputs:
      run_runtime_contract: ${{ steps.detect.outputs.run_runtime_contract }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect runtime/install-impacting changes
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            {
              echo "run_runtime_contract=true"
              echo "changed_files<<EOF"
              echo "(forced full integration run for $EVENT_NAME)"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="$BASE_SHA"
          head="$HEAD_SHA"
          integration_paths_regex='^(flake\.nix|\.github/workflows/ci\.yml|shells/|configs/|home_manager/|locked_devenv_package\.nix|mk_runtime_tree\.nix|mk_yazelix_package\.nix|yazelix_runtime_package\.nix|devenv\.lock|devenv\.nix|devenv\.yaml|yazelix_default\.toml|yazelix_packs_default\.toml|nushell/scripts/core/|nushell/scripts/setup/|nushell/scripts/utils/|nushell/scripts/dev/validate_flake_install\.nu|nushell/scripts/dev/validate_installed_runtime_contract\.nu|nushell/scripts/dev/devenv_lock_contract\.nu)'

          if [ -z "${base:-}" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse "$head^" 2>/dev/null || git rev-list --max-parents=0 "$head" | tail -n1)"
          fi

          changed="$(git diff --name-only "$base" "$head")"

          echo "Changed files since $base..$head:"
          if [ -n "$changed" ]; then
            printf '%s\n' "$changed"
          else
            echo "(none)"
          fi

          run_runtime_contract=false
          if printf '%s\n' "$changed" | grep -E "$integration_paths_regex" >/dev/null; then
            run_runtime_contract=true
          fi

          {
            echo "run_runtime_contract=$run_runtime_contract"
            echo "changed_files<<EOF"
            printf '%s\n' "$changed"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  validate:
    # Always-on fast lane. Keep this strong enough for branch protection and
    # routine pushes, but do not make every commit pay for cold install/runtime smoke.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: true
          use-flakehub: false

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Validate Nushell syntax
        run: nu nushell/scripts/dev/validate_syntax.nu

      - name: Validate generated README surface
        run: nu nushell/scripts/dev/validate_readme_version.nu

      - name: Validate upgrade contract
        run: nu nushell/scripts/dev/validate_upgrade_contract.nu --ci

      - name: Validate config surface and launch-profile contract
        run: nu nushell/scripts/dev/validate_config_surface_contract.nu

      - name: Validate spec traceability
        run: nu nushell/scripts/dev/validate_specs.nu

      - name: Validate default-suite shape and traceability
        run: nu nushell/scripts/dev/validate_default_test_traceability.nu

      - name: Validate top-level flake interface
        run: nu nushell/scripts/dev/validate_flake_interface.nu

  integration:
    # Medium-cost installed-runtime contract lane. Keep this path-gated so
    # routine pushes do not disappear behind top-level workflow filters.
    needs: [detect_integration_changes, validate]
    if: ${{ needs.validate.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Skip installed-runtime contract smoke
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract != 'true' }}
        shell: bash
        run: |
          echo "Skipping installed-runtime contract lane: no relevant files changed."
          echo "Changed files:"
          if [ -n "${{ needs.detect_integration_changes.outputs.changed_files }}" ]; then
            printf '%s\n' "${{ needs.detect_integration_changes.outputs.changed_files }}"
          else
            echo "(none)"
          fi

      - name: Check out repository
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract == 'true' }}
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Enable Nix cache
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract == 'true' }}
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: true
          use-flakehub: false

      - name: Set up Nushell
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract == 'true' }}
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Validate installed-runtime contract smoke
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract == 'true' }}
        run: nu nushell/scripts/dev/validate_installed_runtime_contract.nu

  cold_install:
    # Full cold install/rebuild smoke. Keep this on nightly/manual validation
    # instead of routine pushes and PRs because the runtime closure can be
    # substitution-sensitive and much more expensive than the contract lane.
    needs: [detect_integration_changes, validate]
    if: ${{ needs.validate.result == 'success' && needs.detect_integration_changes.outputs.run_runtime_contract == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: true
          use-flakehub: false

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Run cold flake install rebuild
        run: nu nushell/scripts/dev/validate_flake_install.nu install "${{ runner.temp }}/yazelix_flake_install_smoke"

      - name: Verify cold flake installed runtime
        run: nu nushell/scripts/dev/validate_flake_install.nu verify "${{ runner.temp }}/yazelix_flake_install_smoke"
