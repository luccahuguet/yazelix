name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: true
          use-flakehub: false

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Validate Nushell syntax
        run: nu nushell/scripts/dev/validate_syntax.nu

      - name: Validate generated README surface
        run: nu nushell/scripts/dev/validate_readme_version.nu

      - name: Validate upgrade contract
        run: nu nushell/scripts/dev/validate_upgrade_contract.nu --ci

      - name: Validate config surface and launch-profile contract
        run: nu nushell/scripts/dev/validate_config_surface_contract.nu

      - name: Validate spec traceability
        run: nu nushell/scripts/dev/validate_specs.nu

      - name: Validate default-suite shape and traceability
        run: nu nushell/scripts/dev/validate_default_test_traceability.nu

      - name: Validate default-suite runtime budget
        run: nu nushell/scripts/dev/validate_default_test_budget.nu

      - name: Check Home Manager flake
        shell: bash
        run: nix flake check ./home_manager --no-build

      - name: Validate flake install smoke path
        run: nu nushell/scripts/dev/validate_flake_install.nu
