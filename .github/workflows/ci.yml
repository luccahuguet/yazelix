name: CI

on:
  # Release tags point at commits already validated on main; run CI for branch
  # pushes and PRs, not tag pushes.
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_runtime_smoke:
        description: "Run fast runtime package smoke"
        required: false
        type: boolean
        default: false
      run_cold_install:
        description: "Run cold profile install smoke"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "30 7 * * 0"

permissions:
  contents: read

jobs:
  source_contracts:
    # Always-on source-contract lane. Keep this strong enough for branch
    # protection and routine pushes, while independent Nix-heavy validators run
    # in parallel jobs below.
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # The always-on lane is source-contract validation, not a package build.
      # Keep the expensive disk cleanup in Nix-heavy runtime smoke jobs below.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cache Rust validation build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: rust-validation-${{ runner.os }}-${{ hashFiles('rust_core/Cargo.lock', 'flake.lock') }}
          restore-keys: |
            rust-validation-${{ runner.os }}-

      # Keep the always-on lane off Magic Nix Cache. Its post-job uploads can
      # outlive the validators and turn green checks into timeout failures.
      - name: Build Rust validation helpers
        run: |
          set -euo pipefail
          nix develop .#ci -c cargo build --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -p yazelix_core --bin yzx_core
          echo "YAZELIX_YZX_CORE_BIN=$GITHUB_WORKSPACE/rust_core/target/debug/yzx_core" >> "$GITHUB_ENV"

      - name: Validate Nushell syntax
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-nushell-syntax

      - name: Validate generated README surface
        shell: bash
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-readme-version

      - name: Validate upgrade contract
        shell: bash
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-upgrade-contract --ci

      - name: Validate config surface and launch-profile contract
        shell: bash
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-config-surface-contract

      - name: Validate contracts
        shell: bash
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-contracts

      - name: Validate docs experience
        shell: bash
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-docs-experience

      - name: Validate Rust test traceability
        shell: bash
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-rust-test-traceability

      - name: Validate top-level flake interface
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-flake-interface

  nix_customization_api:
    # Nix-heavy release validator split out of the source-contract lane so
    # release feedback can arrive in parallel without weakening evidence.
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free runner disk space
        run: |
          set -euo pipefail
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/az
          docker system prune --all --force --volumes || true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cache Rust validation build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: rust-validation-${{ runner.os }}-${{ hashFiles('rust_core/Cargo.lock', 'flake.lock') }}
          restore-keys: |
            rust-validation-${{ runner.os }}-

      - name: Build maintainer validator
        run: nix develop .#ci -c cargo build --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator

      - name: Validate Nix customization API
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-nix-customization-api

  child_release_transaction:
    # Child publication/package-boundary validation can run independently from
    # the source-contract and Nix-customization lanes.
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free runner disk space
        run: |
          set -euo pipefail
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/az
          docker system prune --all --force --volumes || true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cache Rust validation build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: rust-validation-${{ runner.os }}-${{ hashFiles('rust_core/Cargo.lock', 'flake.lock') }}
          restore-keys: |
            rust-validation-${{ runner.os }}-

      - name: Build maintainer validator
        run: nix develop .#ci -c cargo build --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator

      - name: Validate child release transaction and Darwin child package smoke contracts
        run: nix develop .#ci -c ./rust_core/target/debug/yzx_repo_validator validate-child-release-transaction

  darwin_wasm_package_smoke:
    name: Darwin wasm package smoke
    # Required Darwin signal for first-party Zellij wasm plugins. Keep this
    # narrower than the cache-publishing workflow so ordinary PR CI stays
    # read-only and does not depend on Cachix secrets.
    runs-on: macos-15
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Build Darwin first-party Zellij wasm packages
        run: |
          nix build --no-link --no-write-lock-file \
            .#packages.aarch64-darwin.yazelix_zellij_pane_orchestrator \
            .#packages.aarch64-darwin.yazelix_zellij_popup

  runtime_smoke:
    # Fast scheduled/manual runtime lane. It builds the packaged runtime once
    # and exercises helper-command presence, runtime env setup, generated
    # materialization, and desktop install shape through a package-root profile
    # shim. The cold_install lane below owns full nix profile install evidence.
    needs: [source_contracts, nix_customization_api, child_release_transaction]
    if: ${{ needs.source_contracts.result == 'success' && needs.nix_customization_api.result == 'success' && needs.child_release_transaction.result == 'success' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_runtime_smoke)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free runner disk space
        run: |
          set -euo pipefail
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/az
          docker system prune --all --force --volumes || true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: true
          use-flakehub: false

      - name: Build maintainer validator
        run: nix develop -c cargo build --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator

      - name: Validate runtime package smoke
        shell: bash
        run: nix develop -c ./rust_core/target/debug/yzx_repo_validator validate-runtime-package-smoke

  cold_install:
    # Explicit heavy lane for full nix profile install/rebuild evidence. It is
    # manual-only because runtime_smoke owns scheduled runtime behavior checks.
    needs: [source_contracts, nix_customization_api, child_release_transaction]
    if: ${{ needs.source_contracts.result == 'success' && needs.nix_customization_api.result == 'success' && needs.child_release_transaction.result == 'success' && github.event_name == 'workflow_dispatch' && inputs.run_cold_install }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free runner disk space
        run: |
          set -euo pipefail
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/az
          docker system prune --all --force --volumes || true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: true
          use-flakehub: false

      - name: Build maintainer validator
        run: nix develop -c cargo build --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator

      - name: Run cold profile install build
        run: nix develop -c ./rust_core/target/debug/yzx_repo_validator validate-flake-profile-install install "${{ runner.temp }}/yazelix_flake_install_smoke"

      - name: Verify cold profile-installed runtime
        run: nix develop -c ./rust_core/target/debug/yzx_repo_validator validate-flake-profile-install verify "${{ runner.temp }}/yazelix_flake_install_smoke"
