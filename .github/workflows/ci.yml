name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            max-jobs = 2
            cores = 2

      - name: Show flake outputs
        run: nix flake show --all-systems

      - name: Check flake shape
        run: nix flake check --no-build

      - name: Build lightweight checks
        run: |
          nix build --no-link --print-build-logs \
            .#checks.x86_64-linux.yzn_yazi_materialization \
            .#checks.x86_64-linux.yzn_launcher_unit \
            .#checks.x86_64-linux.runtime_contracts \
            .#checks.x86_64-linux.zellij_sidecar_guard_parity
