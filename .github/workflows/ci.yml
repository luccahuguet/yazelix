name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

jobs:
  linux:
    # Route to the self-hosted profile runner for trusted refs (push + same-repo
    # PRs). Only true fork PRs (head repo differs from this repo) fall back to a
    # GitHub-hosted runner. NB: head.repo.fork is unusable here because this
    # repository is itself a fork of upstream yazelix, so that flag is true for
    # every PR; compare full_name against github.repository instead.
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'ubuntu-latest' || fromJSON('["self-hosted","linux","x64","local","flexnetos"]') }}
    timeout-minutes: 60
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            accept-flake-config = true
            max-jobs = 2
            cores = 2

      - name: Install Nushell
        uses: hustcer/setup-nu@v3

      - name: Show flake outputs
        run: nix flake show --all-systems

      - name: Check flake shape
        run: nix flake check --no-build --all-systems

      # Upstream step, converted to the repository's Nushell workflow shell.
      - name: Check Helix-free evaluation
        run: |
          for package in [yazelix-no-helix yazelix-no-helix-no-yazi yazelix-no-mars-no-helix yazelix-no-mars-no-helix-no-yazi] {
            ^nix eval --raw --no-write-lock-file --override-input yazelixHelix path:./checks/unavailable-helix $".#packages.aarch64-darwin.($package).drvPath"
          }

      # Fork policy/profile checks + upstream focused checks — one build.
      - name: Build lightweight checks
        run: ^nix build --no-link --print-build-logs .#checks.x86_64-linux.cache_shell_policy .#checks.x86_64-linux.codex_config_materializer .#checks.x86_64-linux.codex_rules_authority .#checks.x86_64-linux.profile_agent_frontdoors .#checks.x86_64-linux.strict_profile_sources .#checks.x86_64-linux.yzx_yazi_materialization .#checks.x86_64-linux.yzx_launcher_unit .#checks.x86_64-linux.runtime_contracts .#checks.x86_64-linux.zellij_sidecar_guard_parity .#checks.x86_64-linux.no_helix_contracts .#checks.x86_64-linux.host_yazi_contracts .#checks.x86_64-linux.no_mars_contracts
