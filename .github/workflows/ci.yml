name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Bootstrap repo-shaped config path
        shell: bash
        run: |
          mkdir -p "$HOME/.config"
          ln -s "$GITHUB_WORKSPACE" "$HOME/.config/yazelix"

      - name: Validate Nushell syntax
        run: nu nushell/scripts/dev/validate_syntax.nu

      - name: Run yzx command tests
        run: nu nushell/scripts/dev/test_yzx_commands.nu

      - name: Check Home Manager flake
        shell: bash
        run: nix flake check ./home_manager --no-build
