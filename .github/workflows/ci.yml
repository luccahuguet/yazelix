name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * 0"

permissions:
  contents: read

jobs:
  # Keep change detection inside the workflow, not in top-level path filters.
  # Required workflows that are skipped by path filters can leave checks pending.
  detect_integration_changes:
    runs-on: ubuntu-latest
    outputs:
      run_runtime_contract: ${{ steps.detect.outputs.run_runtime_contract }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect runtime/install-impacting changes
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            {
              echo "run_runtime_contract=true"
              echo "changed_files<<EOF"
              echo "(forced full integration run for $EVENT_NAME)"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="$BASE_SHA"
          head="$HEAD_SHA"
          integration_paths_regex='^(flake\.nix|flake\.lock|maintainer_shell\.nix|\.github/workflows/ci\.yml|shells/|configs/|home_manager/|packaging/mk_runtime_tree\.nix|yazelix_package\.nix|yazelix_runtime_package\.nix|yazelix_default\.toml|nushell/scripts/core/|nushell/scripts/setup/|nushell/scripts/utils/|rust_core/)'

          if [ -z "${base:-}" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse "$head^" 2>/dev/null || git rev-list --max-parents=0 "$head" | tail -n1)"
          fi

          changed="$(git diff --name-only "$base" "$head")"

          echo "Changed files since $base..$head:"
          if [ -n "$changed" ]; then
            printf '%s\n' "$changed"
          else
            echo "(none)"
          fi

          run_runtime_contract=false
          if printf '%s\n' "$changed" | grep -E "$integration_paths_regex" >/dev/null; then
            run_runtime_contract=true
          fi

          {
            echo "run_runtime_contract=$run_runtime_contract"
            echo "changed_files<<EOF"
            printf '%s\n' "$changed"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  validate:
    # Always-on fast lane. Keep this strong enough for branch protection and
    # routine pushes, but do not make every commit pay for cold install/runtime smoke.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: true
          use-flakehub: false

      - name: Validate Nushell syntax
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-nushell-syntax

      - name: Validate generated README surface
        shell: bash
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-readme-version

      - name: Validate upgrade contract
        shell: bash
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-upgrade-contract --ci

      - name: Build yzx_core helper for source-checkout validators
        shell: bash
        run: |
          set -euo pipefail
          nix shell nixpkgs#cargo nixpkgs#rustc -c cargo build --manifest-path rust_core/Cargo.toml --bin yzx_core
          echo "YAZELIX_YZX_CORE_BIN=$GITHUB_WORKSPACE/rust_core/target/debug/yzx_core" >> "$GITHUB_ENV"

      - name: Validate config surface and launch-profile contract
        shell: bash
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-config-surface-contract

      - name: Validate spec traceability
        shell: bash
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-specs

      - name: Validate default-suite shape and traceability
        shell: bash
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-default-test-traceability

      - name: Validate Rust test traceability
        shell: bash
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-rust-test-traceability

      - name: Validate top-level flake interface
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-flake-interface

  integration:
    # Medium-cost installed-runtime contract lane. Keep this path-gated so
    # routine pushes do not disappear behind top-level workflow filters.
    needs: [detect_integration_changes, validate]
    if: ${{ needs.validate.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Skip installed-runtime contract smoke
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract != 'true' }}
        shell: bash
        run: |
          echo "Skipping installed-runtime contract lane: no relevant files changed."
          echo "Changed files:"
          if [ -n "${{ needs.detect_integration_changes.outputs.changed_files }}" ]; then
            printf '%s\n' "${{ needs.detect_integration_changes.outputs.changed_files }}"
          else
            echo "(none)"
          fi

      - name: Check out repository
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract == 'true' }}
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Enable Nix cache
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract == 'true' }}
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: true
          use-flakehub: false

      - name: Validate installed-runtime contract smoke
        if: ${{ needs.detect_integration_changes.outputs.run_runtime_contract == 'true' }}
        shell: bash
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-installed-runtime-contract

  cold_install:
    # Full cold profile-install/rebuild smoke. Keep this on weekly/manual validation
    # instead of routine pushes and PRs because the runtime closure can be
    # substitution-sensitive and much more expensive than the contract lane.
    needs: [detect_integration_changes, validate]
    if: ${{ needs.validate.result == 'success' && needs.detect_integration_changes.outputs.run_runtime_contract == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      YAZELIX_DIR: ${{ github.workspace }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: true
          use-flakehub: false

      - name: Run cold profile install build
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-flake-profile-install install "${{ runner.temp }}/yazelix_flake_install_smoke"

      - name: Verify cold profile-installed runtime
        run: nix develop -c cargo run --quiet --manifest-path rust_core/Cargo.toml -p yazelix_maintainer --bin yzx_repo_validator -- validate-flake-profile-install verify "${{ runner.temp }}/yazelix_flake_install_smoke"
