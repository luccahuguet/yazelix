name: Version Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: version-gate-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  linux-profile-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            accept-flake-config = true
            max-jobs = 2
            cores = 2

      - name: Install Nushell
        uses: hustcer/setup-nu@v3

      - name: Install yzx into a temp profile
        run: |
          let profile = $"($env.RUNNER_TEMP)/yazelix-profile"
          let runtime_profile = $"($env.RUNNER_TEMP)/yazelix-runtime-profile"
          ^nix profile add --refresh $env.GITHUB_WORKSPACE --profile $profile
          ^nix profile add --refresh $"($env.GITHUB_WORKSPACE)#runtime" --profile $runtime_profile
          if not ($"($profile)/bin/yzx" | path exists) { error make {msg: "full profile is missing yzx"} }
          if not ($"($profile)/share/applications/yzx.desktop" | path exists) { error make {msg: "full profile is missing desktop entry"} }
          if not ((open --raw $"($profile)/share/applications/yzx.desktop") | str contains "Yazelix Nova") { error make {msg: "desktop entry identity mismatch"} }
          if not ($"($runtime_profile)/bin/yzx" | path exists) { error make {msg: "runtime profile is missing yzx"} }
          if ($"($runtime_profile)/share/applications/yzx.desktop" | path exists) { error make {msg: "runtime profile contains a desktop entry"} }

      - name: Build release contract checks
        run: |
          ^nix build --no-link --print-build-logs
            .#checks.x86_64-linux.cache_shell_policy
            .#checks.x86_64-linux.contracts
            .#checks.x86_64-linux.helix_contracts
            .#checks.x86_64-linux.key_reference_parity

      - name: Smoke installed yzx commands
        run: |
          let profile = $"($env.RUNNER_TEMP)/yazelix-profile"
          $env.HOME = $"($env.RUNNER_TEMP)/yazelix-home"
          $env.YAZELIX_CONFIG_HOME = $"($env.RUNNER_TEMP)/yazelix-config"
          $env.YAZELIX_STATE_DIR = $"($env.RUNNER_TEMP)/yazelix-state"
          $env.XDG_DATA_HOME = $"($env.RUNNER_TEMP)/yazelix-data"
          mkdir $env.HOME $env.YAZELIX_CONFIG_HOME $env.YAZELIX_STATE_DIR $env.XDG_DATA_HOME
          let help = (^$"($profile)/bin/yzx" help)
          let status = (^$"($profile)/bin/yzx" status)
          let doctor = (^$"($profile)/bin/yzx" doctor)
          let tutor = (^$"($profile)/bin/yzx" tutor list)
          for expected in ["Yazelix Nova" "Yazelix Nova status" $"config home: ($env.YAZELIX_CONFIG_HOME)" $"state dir: ($env.YAZELIX_STATE_DIR)" "Yazelix Nova doctor" $"ok config home: ($env.YAZELIX_CONFIG_HOME)" "Yazelix Nova tutor lessons"] {
            if not ($"($help)($status)($doctor)($tutor)" | str contains $expected) { error make {msg: $"missing expected output: ($expected)"} }
          }

  macos-package-smoke:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            accept-flake-config = true
            max-jobs = 1
            cores = 2

      - name: Install Nushell
        uses: hustcer/setup-nu@v3

      - name: Build aarch64-darwin packages and Home Manager closure
        run: |
          let full = (^nix build --no-link --no-write-lock-file --print-out-paths --print-build-logs .#packages.aarch64-darwin.yazelix | str trim)
          let runtime = (^nix build --no-link --no-write-lock-file --print-out-paths --print-build-logs .#packages.aarch64-darwin.runtime | str trim)
          ^nix build --no-link --no-write-lock-file --print-build-logs .#checks.aarch64-darwin.home_manager
          if ($"($full)/share/applications/yzx.desktop" | path exists) { error make {msg: "full Darwin package contains Linux desktop entry"} }
          if ($"($runtime)/share/applications/yzx.desktop" | path exists) { error make {msg: "runtime Darwin package contains Linux desktop entry"} }
