name: Sync Beads With Issues

on:
  issues:
    types:
      - opened
      - reopened
      - closed

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      BR_VERSION: v0.1.31
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Install br
        run: |
          asset="br-${BR_VERSION}-linux_amd64.tar.gz"
          checksum="$asset.sha256"
          curl -fsSL -o /tmp/$asset "https://github.com/Dicklesworthstone/beads_rust/releases/download/${BR_VERSION}/${asset}"
          curl -fsSL -o /tmp/$checksum "https://github.com/Dicklesworthstone/beads_rust/releases/download/${BR_VERSION}/${checksum}"
          (
            cd /tmp
            sha256sum -c $checksum
          )
          tar -xzf /tmp/$asset -C /tmp
          install -m 0755 /tmp/br /usr/local/bin/br
          br --version

      - name: Sync issue into Beads
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_ACTION: ${{ github.event.action }}
        run: nu .github/scripts/sync_issue_to_bead.nu

      - name: Commit Beads export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- .beads/issues.jsonl; then
            exit 0
          fi
          git add .beads/issues.jsonl
          git commit -m "Sync issue #${{ github.event.issue.number }} to Beads"
          git push
